name: Update Podcast Episodes

on:
  schedule:
    # Run daily at 8:00 AM UTC (11:00 AM Israel time)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and update episodes
        run: python3 scripts/update-episodes.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add he/podcast/index.html
          git diff --staged --quiet || git commit -m "Update podcast episodes from RSS feed"
          git push
